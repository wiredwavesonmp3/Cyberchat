<!DOCTYPE html>
<html>
<head>
  <title>CYBERCHAT</title>
  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
    }

    h1 {
      text-shadow: 0 0 10px #00ffcc;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #00ffcc;
      margin: 20px;
      padding: 10px;
    }

    input {
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 10px;
      width: 70%;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>⚡ CYBERCHAT ⚡</h1>

<div id="chat"></div>

<input id="msg" placeholder="Enter message..." />
<button onclick="send()">SEND</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://cyberchat-zzfn.onrender.com/");

const chat = document.getElementById("chat");

socket.on("chat message", (msg) => {
  const div = document.createElement("div");
  div.textContent = msg;
  chat.appendChild(div);
});

function send() {
  const input = document.getElementById("msg");
  socket.emit("chat message", input.value);
  input.value = "";
}
</script>

</body>
</html>
